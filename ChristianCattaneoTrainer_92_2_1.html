<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian Cattaneo Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-zinc-900 border-b border-zinc-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 border-2 border-amber-500 rounded-full flex items-center justify-center text-amber-500 font-bold">
                    <i class="fa-solid fa-dumbbell text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-wider text-amber-500 uppercase">Christian Cattaneo</h1>
                    <p class="text-xs tracking-widest text-gray-400 uppercase font-semibold">Personal Trainer</p>
                </div>
            </div>
            
            <nav class="flex flex-wrap gap-2">
                <button onclick="mostrarDashboard()" class="px-4 py-2 rounded bg-amber-500 text-zinc-950 font-bold text-sm uppercase transition hover:bg-amber-400">Alumnos</button>
                <button class="px-4 py-2 rounded bg-zinc-800 text-gray-300 font-semibold text-sm uppercase transition hover:bg-zinc-700">Nueva Sesión</button>
                <button class="px-4 py-2 rounded bg-zinc-800 text-gray-300 font-semibold text-sm uppercase transition hover:bg-zinc-700">Calendario</button>
            </nav>

            <div class="flex gap-2 text-xs">
                <button class="px-3 py-1.5 rounded bg-amber-500/10 text-amber-500 border border-amber-500/20 font-medium flex items-center gap-1"><i class="fa-solid fa-link"></i> Conectar Drive</button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
        
        <section id="vista-dashboard" class="block">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-tight text-gray-100 uppercase border-b-2 border-amber-500 pb-1">Mis Alumnos</h2>
                <button class="px-4 py-2 bg-amber-500 text-zinc-950 font-bold rounded text-sm uppercase flex items-center gap-2 hover:bg-amber-400">
                    <i class="fa-solid fa-user-plus"></i> Agregar Alumno
                </button>
            </div>
            
            <div id="grid-alumnos" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
        </section>
<section id="vista-alumno" class="hidden space-y-6">
            
            <button onclick="mostrarDashboard()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-gray-200 text-xs font-bold uppercase rounded flex items-center gap-2 transition w-fit">
                <i class="fa-solid fa-arrow-left"></i> Volver a Alumnos
            </button>

            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 md:p-6 shadow-xl">
                <div class="flex flex-col md:flex-row gap-6 items-center md:items-start">
                    
                    <div class="relative group w-32 h-32 md:w-36 md:h-36 shrink-0 bg-zinc-800 border-2 border-dashed border-zinc-700 rounded-xl flex flex-col items-center justify-center overflow-hidden cursor-pointer hover:border-amber-500 transition">
                        <div id="foto-alumno-contenedor" class="absolute inset-0 flex items-center justify-center bg-zinc-800">
                            <i class="fa-solid fa-user text-4xl text-zinc-600 group-hover:text-amber-500 transition"></i>
                        </div>
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center text-center p-2 transition text-xs text-amber-500 font-bold">
                            <i class="fa-solid fa-camera text-base mb-1"></i>
                            SUBIR FOTO
                        </div>
                    </div>

                    <div class="flex-1 w-full space-y-4 text-center md:text-left">
                        <div class="border-b border-zinc-800/80 pb-3">
                            <div class="flex flex-wrap items-center justify-center md:justify-start gap-x-4 gap-y-2 text-sm text-gray-400">
                                <span id="calc-nombre" class="text-2xl font-black tracking-tight text-white uppercase block w-full md:w-auto mr-2">Cargando...</span>
                                <span class="bg-zinc-800 px-2.5 py-1 rounded text-xs font-bold text-amber-500 border border-zinc-700/50 uppercase tracking-wider" id="calc-id">ALUMNO</span>
                                <span><i class="fa-solid fa-calendar-days text-zinc-600 mr-1.5"></i>Edad: <strong class="text-gray-200 font-medium" id="calc-edad">-</strong></span>
                                <span><i class="fa-solid fa-heart-pulse text-zinc-600 mr-1.5"></i>Lesiones: <strong class="text-red-400 font-medium" id="calc-lesiones">NO TIENE</strong></span>
                            </div>
                        </div>

                        <div>
                            <p class="text-xs uppercase tracking-widest text-zinc-500 font-bold mb-1">Objetivo del Alumno</p>
                            <div class="bg-amber-500/5 border border-amber-500/20 px-4 py-2.5 rounded-lg text-amber-400 font-semibold text-base shadow-inner" id="calc-objetivo">
                                No definido
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-t-2 border-zinc-800/60 my-6">

            <div class="space-y-4">
                <h3 class="text-lg font-bold uppercase tracking-wider text-gray-400">Escritorio de Trabajo</h3>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
                    
                    <button onclick="abrirModulo('fuerza')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-amber-500/60 text-left transition shadow-md group">
                        <div class="w-10 h-10 bg-amber-500/10 rounded-lg flex items-center justify-center text-amber-500 mb-3 group-hover:bg-amber-500 group-hover:text-zinc-950 transition">
                            <i class="fa-solid fa-dumbbell text-lg"></i>
                        </div>
                        <h4 class="font-bold text-gray-200 uppercase text-sm tracking-wide">Entrenamiento de Fuerza</h4>
                        <p class="text-xs text-zinc-500 mt-1">Sesiones y rutinas</p>
                    </button>

                    <button onclick="abrirModulo('running')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-amber-500/60 text-left transition shadow-md group">
                        <div class="w-10 h-10 bg-amber-500/10 rounded-lg flex items-center justify-center text-amber-500 mb-3 group-hover:bg-amber-500 group-hover:text-zinc-950 transition">
                            <i class="fa-solid fa-person-running text-lg"></i>
                        </div>
                        <h4 class="font-bold text-gray-200 uppercase text-sm tracking-wide">Entrenamiento de Running</h4>
                        <p class="text-xs text-zinc-500 mt-1">Sesiones y planificación</p>
                    </button>

                    <button onclick="abrirModulo('nutricion')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-amber-500/60 text-left transition shadow-md group">
                        <div class="w-10 h-10 bg-amber-500/10 rounded-lg flex items-center justify-center text-amber-500 mb-3 group-hover:bg-amber-500 group-hover:text-zinc-950 transition">
                            <i class="fa-solid fa-apple-whole text-lg"></i>
                        </div>
                        <h4 class="font-bold text-gray-200 uppercase text-sm tracking-wide">Información Nutricional</h4>
                        <p class="text-xs text-zinc-500 mt-1">Macronutrientes y objetivos</p>
                    </button>

                    <button onclick="abrirModulo('objetivos-info')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-amber-500/60 text-left transition shadow-md group">
                        <div class="w-10 h-10 bg-amber-500/10 rounded-lg flex items-center justify-center text-amber-500 mb-3 group-hover:bg-amber-500 group-hover:text-zinc-950 transition">
                            <i class="fa-solid fa-chart-line text-lg"></i>
                        </div>
                        <h4 class="font-bold text-gray-200 uppercase text-sm tracking-wide">Información de Objetivos</h4>
                        <p class="text-xs text-zinc-500 mt-1">Antropometría, composición y devolución</p>
                    </button>

                    <button onclick="abrirModulo('archivos')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-amber-500/60 text-left transition shadow-md group sm:col-span-2 lg:col-span-1">
                        <div class="w-10 h-10 bg-amber-500/10 rounded-lg flex items-center justify-center text-amber-500 mb-3 group-hover:bg-amber-500 group-hover:text-zinc-950 transition">
                            <i class="fa-solid fa-folder-open text-lg"></i>
                        </div>
                        <h4 class="font-bold text-gray-200 uppercase text-sm tracking-wide">Archivos</h4>
                        <p class="text-xs text-zinc-500 mt-1">Documentos adjuntos</p>
                    </button>

                </div>

                <div id="workspace-modulo" class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 min-h-[200px] flex items-center justify-center text-zinc-600 text-sm italic shadow-inner">
                    Seleccioná una herramienta del escritorio de trabajo para operar.
                </div>
            </div>
        </section>
    </main>
